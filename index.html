<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Tracker — Sistema de Gestão</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500;600&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0c0e;
  --surface: #141416;
  --surface2: #1c1c20;
  --surface3: #242428;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.12);
  --text: #e8e8ec;
  --muted: #72727e;
  --muted2: #4a4a54;
  --green: #1a7a55;
  --green-light: #22c97a;
  --blue: #2563eb;
  --blue-light: #60a5fa;
  --purple: #5c2d91;
  --purple-light: #a78bfa;
  --red: #b01c2e;
  --red-light: #f87171;
  --amber: #d97706;
  --amber-light: #fbbf24;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Geist', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── NOISE TEXTURE ── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
  opacity: .4;
}

/* ── SIDEBAR ── */
.sidebar {
  position: fixed;
  left: 0; top: 0; bottom: 0;
  width: 220px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 100;
  padding: 0;
}

.sidebar-logo {
  padding: 24px 20px 20px;
  border-bottom: 1px solid var(--border);
}

.sidebar-logo h1 {
  font-family: 'Instrument Serif', serif;
  font-size: 20px;
  font-weight: 400;
  color: #fff;
  line-height: 1.1;
}
.sidebar-logo h1 em {
  font-style: italic;
  color: var(--green-light);
}
.sidebar-logo p {
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  margin-top: 4px;
  letter-spacing: 0.08em;
}

.sidebar-nav {
  flex: 1;
  padding: 12px 8px;
  overflow-y: auto;
}

.nav-section {
  margin-bottom: 20px;
}
.nav-section-label {
  font-family: 'Geist Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted2);
  padding: 0 12px;
  margin-bottom: 4px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  border-radius: 7px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  transition: all .15s;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
}
.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: var(--surface3); color: #fff; }
.nav-item .nav-icon { font-size: 15px; flex-shrink: 0; }
.nav-item .nav-badge {
  margin-left: auto;
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  background: var(--surface3);
  color: var(--muted);
  padding: 1px 6px;
  border-radius: 100px;
}
.nav-item.active .nav-badge { background: rgba(255,255,255,0.08); color: var(--text); }

.sidebar-footer {
  padding: 16px;
  border-top: 1px solid var(--border);
}
.sync-status {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  color: var(--muted);
}
.sync-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green-light);
  flex-shrink: 0;
  box-shadow: 0 0 6px var(--green-light);
}
.sync-dot.syncing { animation: pulse 1s infinite; background: var(--amber-light); box-shadow: 0 0 6px var(--amber-light); }
.sync-dot.error { background: var(--red-light); box-shadow: 0 0 6px var(--red-light); animation: none; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── MAIN ── */
.main {
  margin-left: 220px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.topbar {
  position: sticky;
  top: 0;
  background: rgba(12,12,14,0.85);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 14px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 50;
}

.topbar-title {
  font-family: 'Instrument Serif', serif;
  font-size: 20px;
  font-weight: 400;
  color: #fff;
}
.topbar-title em { font-style: italic; color: var(--muted); font-size: 16px; margin-left: 8px; }

.topbar-actions { display: flex; gap: 8px; }

.btn {
  font-family: 'Geist', sans-serif;
  font-size: 12px;
  font-weight: 600;
  padding: 7px 14px;
  border-radius: 7px;
  border: 1px solid var(--border2);
  background: var(--surface2);
  color: var(--text);
  cursor: pointer;
  transition: all .15s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.btn:hover { background: var(--surface3); border-color: rgba(255,255,255,0.2); }
.btn-primary { background: var(--green); border-color: var(--green); color: #fff; }
.btn-primary:hover { background: #1d8f63; border-color: #1d8f63; }
.btn-danger { background: rgba(176,28,46,0.15); border-color: rgba(176,28,46,0.3); color: var(--red-light); }
.btn-danger:hover { background: rgba(176,28,46,0.25); }

.content { padding: 28px 32px; flex: 1; }

/* ── LOADING / ERROR ── */
.state-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 300px;
  gap: 16px;
  color: var(--muted);
  font-family: 'Geist Mono', monospace;
  font-size: 12px;
}
.spinner {
  width: 28px; height: 28px;
  border: 2px solid var(--border2);
  border-top-color: var(--green-light);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── KPI ROW ── */
.kpi-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 10px;
  margin-bottom: 24px;
}
.kpi {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 18px;
  position: relative;
  overflow: hidden;
}
.kpi::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--kc, var(--green-light));
}
.kpi-label {
  font-family: 'Geist Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}
.kpi-val {
  font-family: 'Instrument Serif', serif;
  font-size: 32px;
  color: #fff;
  line-height: 1;
}
.kpi-sub {
  font-family: 'Geist Mono', monospace;
  font-size: 9px;
  color: var(--muted2);
  margin-top: 4px;
}

/* ── TABLE ── */
.table-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 20px;
}
.table-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.table-title {
  font-size: 13px;
  font-weight: 600;
  color: #fff;
  display: flex;
  align-items: center;
  gap: 8px;
}
.table-count {
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  background: var(--surface2);
  padding: 2px 8px;
  border-radius: 100px;
}
table {
  width: 100%;
  border-collapse: collapse;
}
thead th {
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  padding: 10px 16px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background .12s;
  cursor: pointer;
}
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--surface2); }
td {
  padding: 12px 16px;
  font-size: 12px;
  color: var(--text);
  vertical-align: middle;
}
.td-name { font-weight: 600; color: #fff; font-size: 13px; }
.td-mono { font-family: 'Geist Mono', monospace; font-size: 11px; color: var(--muted); }

/* ── PILLS ── */
.pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  padding: 3px 8px;
  border-radius: 100px;
  border: 1px solid transparent;
  white-space: nowrap;
}
.pill-green  { background: rgba(26,122,85,0.15);  color: var(--green-light);  border-color: rgba(26,122,85,0.3); }
.pill-blue   { background: rgba(37,99,235,0.15);  color: var(--blue-light);   border-color: rgba(37,99,235,0.3); }
.pill-purple { background: rgba(92,45,145,0.15);  color: var(--purple-light); border-color: rgba(92,45,145,0.3); }
.pill-red    { background: rgba(176,28,46,0.15);  color: var(--red-light);    border-color: rgba(176,28,46,0.3); }
.pill-amber  { background: rgba(217,119,6,0.15);  color: var(--amber-light);  border-color: rgba(217,119,6,0.3); }
.pill-gray   { background: rgba(114,114,126,0.15);color: var(--muted);        border-color: rgba(114,114,126,0.3); }

/* score bar */
.score-wrap { display: flex; align-items: center; gap: 8px; }
.score-bar-bg { width: 48px; height: 3px; background: var(--surface3); border-radius: 100px; overflow: hidden; }
.score-bar-fill { height: 100%; border-radius: 100px; }

/* ── MODAL ── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(6px);
  z-index: 500;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
}
.overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 14px;
  padding: 28px;
  width: 100%;
  max-width: 540px;
  max-height: 85vh;
  overflow-y: auto;
  transform: translateY(10px);
  transition: transform .2s;
}
.overlay.open .modal { transform: translateY(0); }
.modal-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 22px;
}
.modal-title {
  font-family: 'Instrument Serif', serif;
  font-size: 22px;
  color: #fff;
  font-weight: 400;
}
.modal-x {
  background: none; border: none;
  color: var(--muted); font-size: 18px;
  cursor: pointer; line-height: 1;
  padding: 4px;
}
.modal-x:hover { color: #fff; }

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.fg { display: flex; flex-direction: column; gap: 6px; }
.fg.full { grid-column: 1/-1; }
.fg label {
  font-family: 'Geist Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
}
.fg input, .fg select, .fg textarea {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 9px 12px;
  color: var(--text);
  font-family: 'Geist', sans-serif;
  font-size: 13px;
  transition: border-color .15s;
  width: 100%;
}
.fg input:focus, .fg select:focus, .fg textarea:focus {
  outline: none;
  border-color: var(--green-light);
}
.fg select option { background: var(--surface2); }
.fg textarea { resize: vertical; min-height: 72px; }
.modal-actions {
  display: flex;
  gap: 8px;
  margin-top: 18px;
  justify-content: flex-end;
}

/* ── KANBAN ── */
.kanban-wrap { overflow-x: auto; padding-bottom: 20px; }
.kanban-board { display: flex; gap: 12px; min-width: max-content; }
.kcol { width: 230px; flex-shrink: 0; }
.kcol-hdr {
  padding: 10px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-bottom: none;
  border-radius: 9px 9px 0 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.kcol-title {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
}
.kcol-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.kcol-ct {
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  color: var(--muted2);
}
.kcol-body {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 0 0 9px 9px;
  padding: 8px;
  min-height: 80px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.kcard {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 11px 12px 11px 15px;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  transition: all .15s;
}
.kcard:hover { border-color: var(--border2); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
.kcard .cbar { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
.kc-title { font-size: 12px; font-weight: 600; color: #fff; margin-bottom: 3px; line-height: 1.3; }
.kc-company { font-family: 'Geist Mono', monospace; font-size: 10px; color: var(--muted); margin-bottom: 8px; }
.kc-foot { display: flex; align-items: center; justify-content: space-between; }
.kc-score { font-family: 'Geist Mono', monospace; font-size: 11px; font-weight: 600; }
.kc-empty { font-family: 'Geist Mono', monospace; font-size: 10px; color: var(--muted2); text-align: center; padding: 20px 8px; }

/* ── DETAIL PANEL ── */
.detail-grid { display: grid; grid-template-columns: 1fr 320px; gap: 20px; }
@media(max-width:1100px){ .detail-grid { grid-template-columns: 1fr; } }
.detail-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 22px;
  margin-bottom: 16px;
}
.detail-card-title {
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 16px;
}
.detail-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  gap: 16px;
}
.detail-row:last-child { border-bottom: none; }
.detail-key { font-size: 11px; color: var(--muted); flex-shrink: 0; }
.detail-val { font-size: 12px; color: var(--text); text-align: right; font-weight: 500; }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 24px; right: 24px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 12px 18px;
  font-family: 'Geist Mono', monospace;
  font-size: 12px;
  color: #fff;
  z-index: 9998;
  transform: translateY(16px);
  opacity: 0;
  transition: all .25s;
  pointer-events: none;
  max-width: 300px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { border-color: rgba(34,201,122,0.4); }
.toast.error { border-color: rgba(248,113,113,0.4); }

/* ── VIEWS ── */
.view { display: none; }
.view.active { display: block; }

/* ── SEARCH ── */
.search-wrap {
  position: relative;
  margin-bottom: 16px;
}
.search-wrap input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px 10px 38px;
  color: var(--text);
  font-family: 'Geist', sans-serif;
  font-size: 13px;
}
.search-wrap input:focus { outline: none; border-color: var(--border2); }
.search-icon {
  position: absolute;
  left: 12px; top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  font-size: 14px;
}

.filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.filter-btn {
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  padding: 5px 12px;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all .15s;
}
.filter-btn.active, .filter-btn:hover { background: var(--surface2); color: #fff; border-color: var(--border2); }

/* ── PROFILE HERO ── */
.profile-hero {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  margin-bottom: 20px;
}
.profile-banner { height: 5px; }
.profile-body {
  padding: 24px 28px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 20px;
  flex-wrap: wrap;
}
.profile-avatar {
  width: 52px; height: 52px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Instrument Serif', serif;
  font-size: 22px;
  color: #fff;
  flex-shrink: 0;
}
.profile-name {
  font-family: 'Instrument Serif', serif;
  font-size: 24px;
  color: #fff;
  font-weight: 400;
}
.profile-meta {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  margin-top: 6px;
}
.profile-meta-item {
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 5px;
}

/* editable field */
.editable-field {
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  padding: 2px 4px;
  border-radius: 4px;
  border: 1px solid transparent;
  transition: all .15s;
}
.editable-field:hover { border-color: var(--border); background: var(--surface2); }
.editable-field .edit-icon { font-size: 11px; color: var(--muted2); opacity: 0; transition: opacity .15s; }
.editable-field:hover .edit-icon { opacity: 1; }

/* inline edit */
.inline-edit {
  background: var(--surface2);
  border: 1px solid var(--green-light);
  border-radius: 6px;
  padding: 4px 8px;
  color: var(--text);
  font-family: 'Geist', sans-serif;
  font-size: 12px;
  width: 100%;
}
.inline-edit:focus { outline: none; }

/* empty */
.empty-state {
  text-align: center;
  padding: 48px 20px;
  color: var(--muted);
  font-family: 'Geist Mono', monospace;
  font-size: 12px;
}
.empty-icon { font-size: 32px; margin-bottom: 12px; opacity: .3; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<nav class="sidebar">
  <div class="sidebar-logo">
    <h1>Job <em>Tracker</em></h1>
    <p>Sistema de Gestão</p>
  </div>
  <div class="sidebar-nav">
    <div class="nav-section">
      <div class="nav-section-label">Visão Geral</div>
      <button class="nav-item active" onclick="switchView('dashboard',this)">
        <span class="nav-icon">📊</span> Dashboard
      </button>
    </div>
    <div class="nav-section">
      <div class="nav-section-label">Pipeline</div>
      <button class="nav-item" onclick="switchView('candidatos',this)">
        <span class="nav-icon">👤</span> Candidatos
        <span class="nav-badge" id="nav-badge-candidatos">—</span>
      </button>
      <button class="nav-item" onclick="switchView('vagas',this)">
        <span class="nav-icon">📋</span> Vagas
        <span class="nav-badge" id="nav-badge-vagas">—</span>
      </button>
      <button class="nav-item" onclick="switchView('kanban',this)">
        <span class="nav-icon">🗂️</span> Kanban
      </button>
    </div>
    <div class="nav-section">
      <div class="nav-section-label">Histórico</div>
      <button class="nav-item" onclick="switchView('cvs',this)">
        <span class="nav-icon">📄</span> CVs Gerados
        <span class="nav-badge" id="nav-badge-cvs">—</span>
      </button>
    </div>
  </div>
  <div class="sidebar-footer">
    <div class="sync-status">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-label">Conectando...</span>
    </div>
  </div>
</nav>

<!-- MAIN -->
<main class="main">
  <div class="topbar">

<script>
// ══════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════
const TOKEN = 'ntn_t430438681946gp93r5M8KNhJ70uepI9eUMXD1xoyfZ6Cw';
const DB = {
  candidatos: 'e67a15e904ad43c2a92ab0418d36e06d',
  vagas:      '800f7d6ac22a4b02a849f3f6283149c6',
  cvs:        'c47395bf2dd94fb19630e2e0f6fa953c',
};
const PROXY = 'https://notion-api.splitbee.io/v1';

const STATUSES = [
  {key:'Salvo',        dot:'#a78bfa', cls:'pill-purple'},
  {key:'Aplicado',     dot:'#60a5fa', cls:'pill-blue'},
  {key:'Em Entrevista',dot:'#fbbf24', cls:'pill-amber'},
  {key:'Ag. Resposta', dot:'#fb923c', cls:'pill-amber'},
  {key:'Neg. de Oferta',dot:'#34d399',cls:'pill-green'},
  {key:'Contratado',   dot:'#22c97a', cls:'pill-green'},
  {key:'Rejeitado',    dot:'#f87171', cls:'pill-red'},
  {key:'Cancelado',    dot:'#72727e', cls:'pill-gray'},
];
const SM = Object.fromEntries(STATUSES.map(s=>[s.key,s]));

const PILAR_COLOR = {
  'Product/Program': 'pill-green',
  'OpEx':            'pill-blue',
  'Consulting':      'pill-red',
  'Regulatório':     'pill-purple',
  'Outro':           'pill-gray',
};

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let DATA = { candidatos: [], vagas: [], cvs: [] };
let filteredCandidatos = [];
let filteredVagas = [];
let vagaStatusFilter = 'all';
let vagaSearch = '';
let candidatoSearch = '';
let kanbanClienteFilter = 'all';
let currentView = 'dashboard';

// ══════════════════════════════════════════
// NOTION API
// ══════════════════════════════════════════
async function notionQuery(dbId, filter = null, sorts = null) {
  const body = {};
  if (filter) body.filter = filter;
  if (sorts) body.sorts = sorts;
  const res = await fetch(`${PROXY}/databases/${dbId}/query`, {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json', 'Notion-Version': '2022-06-28' },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error(`Notion API error: ${res.status}`);
  const data = await res.json();
  return data.results || [];
}

async function notionCreate(dbId, props) {
  const res = await fetch(`${PROXY}/pages`, {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json', 'Notion-Version': '2022-06-28' },
    body: JSON.stringify({ parent: { database_id: dbId }, properties: props })
  });
  if (!res.ok) throw new Error(`Notion create error: ${res.status}`);
  return res.json();
}

async function notionUpdate(pageId, props) {
  const res = await fetch(`${PROXY}/pages/${pageId}`, {
    method: 'PATCH',
    headers: { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json', 'Notion-Version': '2022-06-28' },
    body: JSON.stringify({ properties: props })
  });
  if (!res.ok) throw new Error(`Notion update error: ${res.status}`);
  return res.json();
}

// ══════════════════════════════════════════
// PARSE HELPERS
// ══════════════════════════════════════════
function pText(p)    { return p?.rich_text?.map(t=>t.plain_text).join('')||p?.title?.map(t=>t.plain_text).join('')||''; }
function pSel(p)     { return p?.select?.name||''; }
function pMulti(p)   { return (p?.multi_select||[]).map(s=>s.name); }
function pNum(p)     { return p?.number??null; }
function pDate(p)    { return p?.date?.start||''; }
function pCheck(p)   { return p?.checkbox||false; }
function pEmail(p)   { return p?.email||''; }
function pPhone(p)   { return p?.phone_number||''; }
function pUrl(p)     { return p?.url||''; }
function pRelIds(p)  { return (p?.relation||[]).map(r=>r.id); }

function parseCandidato(page) {
  const p = page.properties;
  return {
    id: page.id,
    url: page.url,
    nome: pText(p['Nome']),
    email: pEmail(p['Email']),
    telefone: pPhone(p['Telefone']),
    linkedin: pUrl(p['LinkedIn']),
    cidade: pText(p['Cidade']),
    cidadesAceitas: pText(p['Cidades Aceitas']),
    pilares: pMulti(p['Pilares Ativos']),
    modulos: pMulti(p['Módulos de Setor']),
    modalidade: pSel(p['Modalidade']),
    senioridade: pSel(p['Senioridade']),
    status: pSel(p['Status do Cliente']),
    empresasPrio: pText(p['Empresas Prioritárias']),
    empresasEvitar: pText(p['Empresas a Evitar']),
    diferenciais: pText(p['Diferenciais Únicos']),
    metricas: pText(p['Métricas Master']),
    notas: pText(p['Notas Internas']),
    onboarding: pDate(p['Data de Onboarding']),
  };
}

function parseVaga(page) {
  const p = page.properties;
  return {
    id: page.id,
    url: page.url,
    titulo: pText(p['Título']),
    empresa: pText(p['Empresa']),
    candidatoIds: pRelIds(p['Candidato']),
    pilar: pSel(p['Pilar']),
    modulo: pSel(p['Módulo CV']),
    score: pNum(p['Score']),
    status: pSel(p['Status']),
    cidade: pText(p['Cidade']),
    modalidade: pSel(p['Modalidade']),
    link: pUrl(p['Link da Vaga']),
    dataAplicacao: pDate(p['Data de Aplicação']),
    applyConfirmado: pCheck(p['Apply Confirmado']),
    cvAdaptado: pCheck(p['CV Adaptado']),
    gaps: pText(p['Gaps Identificados']),
    notas: pText(p['Notas']),
    empresaPrioritaria: pCheck(p['Empresa Prioritária']),
  };
}

function parseCv(page) {
  const p = page.properties;
  return {
    id: page.id,
    nome: pText(p['Nome do Arquivo']),
    candidatoIds: pRelIds(p['Candidato']),
    vagaIds: pRelIds(p['Vaga']),
    modulo: pSel(p['Módulo Aplicado']),
    idioma: pSel(p['Idioma']),
    versao: pText(p['Versão']),
    pilar: pSel(p['Pilar Foco']),
    score: pNum(p['Score da Vaga']),
    dataGeracao: pDate(p['Data de Geração']),
    palavrasChave: pText(p['Palavras-chave Injetadas']),
    notas: pText(p['Notas de Adaptação']),
  };
}

// ══════════════════════════════════════════
// LOAD DATA
// ══════════════════════════════════════════
function setSyncStatus(state, label) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  dot.className = 'sync-dot' + (state === 'syncing' ? ' syncing' : state === 'error' ? ' error' : '');
  lbl.textContent = label;
}

async function loadAll() {
  setSyncStatus('syncing', 'Sincronizando...');
  try {
    const [cPages, vPages, cvPages] = await Promise.all([
      notionQuery(DB.candidatos, null, [{property:'Nome',direction:'ascending'}]),
      notionQuery(DB.vagas, null, [{property:'Score',direction:'descending'}]),
      notionQuery(DB.cvs, null, [{property:'Data de Geração',direction:'descending'}]),
    ]);
    DATA.candidatos = cPages.map(parseCandidato);
    DATA.vagas = vPages.map(parseVaga);
    DATA.cvs = cvPages.map(parseCv);
    filteredCandidatos = [...DATA.candidatos];
    filteredVagas = [...DATA.vagas];

    // update badges
    document.getElementById('nav-badge-candidatos').textContent = DATA.candidatos.length;
    document.getElementById('nav-badge-vagas').textContent = DATA.vagas.length;
    document.getElementById('nav-badge-cvs').textContent = DATA.cvs.length;

    renderCurrentView();
    setSyncStatus('ok', 'Notion sincronizado');
  } catch(e) {
    setSyncStatus('error', 'Erro de conexão');
    toast('Erro ao conectar com o Notion', 'error');
    console.error(e);
  }
}

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function renderCurrentView() {
  if (currentView === 'dashboard') renderDashboard();
  else if (currentView === 'candidatos') renderCandidatos();
  else if (currentView === 'vagas') renderVagas();
  else if (currentView === 'kanban') renderKanban();
  else if (currentView === 'cvs') renderCvs();
}

// ── DASHBOARD ──
function renderDashboard() {
  const vagas = DATA.vagas;
  const candidatos = DATA.candidatos;
  const ativos = vagas.filter(v=>!['Rejeitado','Cancelado','Contratado'].includes(v.status));
  const entrevistas = vagas.filter(v=>v.status==='Em Entrevista').length;
  const contratados = vagas.filter(v=>v.status==='Contratado').length;
  const scores = vagas.filter(v=>v.score!=null).map(v=>v.score);
  const avgScore = scores.length ? (scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1) : '—';

  const kpis = [
    {label:'Candidatos',val:candidatos.length,sub:'ativos',c:'var(--green-light)'},
    {label:'Vagas Total',val:vagas.length,sub:'mapeadas',c:'var(--blue-light)'},
    {label:'Pipeline Ativo',val:ativos.length,sub:'em andamento',c:'var(--purple-light)'},
    {label:'Entrevistas',val:entrevistas,sub:'em curso',c:'var(--amber-light)'},
    {label:'Contratados',val:contratados,sub:'fechados',c:'var(--green-light)'},
    {label:'Score Médio',val:avgScore,sub:'alinhamento',c:'#fb923c'},
  ];

  document.getElementById('kpi-row').innerHTML = kpis.map(k=>
    `<div class="kpi" style="--kc:${k.c}">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-val">${k.val}</div>
      <div class="kpi-sub">${k.sub}</div>
    </div>`
  ).join('');

  // Pipeline por candidato
  const byCandidate = candidatos.map(c => {
    const cv = DATA.vagas.filter(v=>v.candidatoIds.includes(c.id));
    const active = cv.filter(v=>!['Rejeitado','Cancelado','Contratado'].includes(v.status));
    const scores = cv.filter(v=>v.score!=null).map(v=>v.score);
    const avg = scores.length ? (scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1) : '—';
    return {c, total:cv.length, active:active.length, avg};
  });

  // Recent vagas
  const recent = [...DATA.vagas]
    .filter(v=>v.dataAplicacao)
    .sort((a,b)=>new Date(b.dataAplicacao)-new Date(a.dataAplicacao))
    .slice(0,5);

  document.getElementById('dashboard-body').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">
      <div class="table-wrap">
        <div class="table-header">
          <div class="table-title">👤 Pipeline por Candidato</div>
        </div>
        <table>
          <thead><tr>
            <th>Candidato</th><th>Total</th><th>Ativos</th><th>Score Médio</th>
          </tr></thead>
          <tbody>
          ${byCandidate.map(({c,total,active,avg})=>`
            <tr onclick="switchView('candidatos'); setTimeout(()=>filterCandidatos('${c.nome}'),100)">
              <td class="td-name">${c.nome}</td>
              <td class="td-mono">${total}</td>
              <td><span class="pill pill-blue">${active}</span></td>
              <td><div class="score-wrap">
                <span class="td-mono" style="color:${scoreColor(avg)}">${avg}</span>
                <div class="score-bar-bg"><div class="score-bar-fill" style="width:${avg!=='—'?avg*10:0}%;background:${scoreColor(avg)}"></div></div>
              </div></td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
      <div class="table-wrap">
        <div class="table-header">
          <div class="table-title">🕒 Candidaturas Recentes</div>
        </div>
        <table>
          <thead><tr><th>Cargo</th><th>Empresa</th><th>Status</th><th>Score</th></tr></thead>
          <tbody>
          ${recent.map(v=>{
            const st = SM[v.status]||{dot:'#666',cls:'pill-gray'};
            return `<tr onclick="openEditVaga('${v.id}')">
              <td class="td-name" style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${v.titulo}</td>
              <td class="td-mono">${v.empresa}</td>
              <td><span class="pill ${st.cls}" style="border-color:${st.dot}33;color:${st.dot}">${v.status}</span></td>
              <td><span style="font-family:'Geist Mono',monospace;font-size:11px;color:${scoreColor(v.score)}">${v.score??'—'}</span></td>
            </tr>`;
          }).join('')}
          </tbody>
        </table>
      </div>
    </div>

    <div class="table-wrap">
      <div class="table-header">
        <div class="table-title">📊 Funil de Status</div>
      </div>
      <div style="padding:16px 20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px">
        ${STATUSES.map(s=>{
          const ct = DATA.vagas.filter(v=>v.status===s.key).length;
          const pct = DATA.vagas.length ? Math.round(ct/DATA.vagas.length*100) : 0;
          return `<div style="text-align:center">
            <div style="font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px">${s.key}</div>
            <div style="font-family:'Instrument Serif',serif;font-size:28px;color:${s.dot};line-height:1">${ct}</div>
            <div style="margin-top:6px;height:3px;background:var(--surface3);border-radius:100px;overflow:hidden">
              <div style="width:${pct}%;height:100%;background:${s.dot};border-radius:100px"></div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>
  `;
}

// ── CANDIDATOS ──
function renderCandidatos() {
  const list = filteredCandidatos;
  document.getElementById('ct-candidatos').textContent = list.length;
  if (!list.length) {
    document.getElementById('table-candidatos').innerHTML = `<div class="empty-state"><div class="empty-icon">👤</div>Nenhum candidato encontrado.</div>`;
    return;
  }
  document.getElementById('table-candidatos').innerHTML = `
    <table>
      <thead><tr>
        <th>Nome</th><th>Senioridade</th><th>Pilares</th><th>Cidades</th><th>Status</th><th>Vagas</th><th></th>
      </tr></thead>
      <tbody>
      ${list.map(c=>{
        const vagas = DATA.vagas.filter(v=>v.candidatoIds.includes(c.id));
        const ativos = vagas.filter(v=>!['Rejeitado','Cancelado','Contratado'].includes(v.status)).length;
        return `<tr onclick="openEditCandidato('${c.id}')">
          <td>
            <div class="td-name">${c.nome}</div>
            <div class="td-mono">${c.email||'—'}</div>
          </td>
          <td><span class="pill pill-gray">${c.senioridade||'—'}</span></td>
          <td>${c.pilares.map(p=>`<span class="pill ${PILAR_COLOR[p]||'pill-gray'}" style="margin-right:3px">${p}</span>`).join('')||'—'}</td>
          <td class="td-mono">${c.cidadesAceitas||c.cidade||'—'}</td>
          <td><span class="pill ${c.status==='Ativo'?'pill-green':c.status==='Pausado'?'pill-amber':'pill-gray'}">${c.status||'—'}</span></td>
          <td class="td-mono">${vagas.length} total · <span style="color:var(--blue-light)">${ativos} ativos</span></td>
          <td><button class="btn" onclick="event.stopPropagation();openEditCandidato('${c.id}')">✏️ Editar</button></td>
        </tr>`;
      }).join('')}
      </tbody>
    </table>`;
}

function filterCandidatos(q) {
  candidatoSearch = q.toLowerCase();
  filteredCandidatos = DATA.candidatos.filter(c =>
    c.nome.toLowerCase().includes(candidatoSearch) ||
    (c.email||'').toLowerCase().includes(candidatoSearch) ||
    c.pilares.join(' ').toLowerCase().includes(candidatoSearch)
  );
  renderCandidatos();
}

// ── VAGAS ──
function renderVagas() {
  // filters
  const statuses = ['all', ...STATUSES.map(s=>s.key)];
  const counts = Object.fromEntries(STATUSES.map(s=>[s.key, DATA.vagas.filter(v=>v.status===s.key).length]));
  document.getElementById('filter-vagas').innerHTML = statuses.map(s=>{
    const ct = s==='all' ? DATA.vagas.length : (counts[s]||0);
    if (s!=='all' && ct===0) return '';
    return `<button class="filter-btn ${vagaStatusFilter===s?'active':''}" onclick="setVagaFilter('${s}')">${s==='all'?'Todas':s} (${ct})</button>`;
  }).join('');

  let list = DATA.vagas;
  if (vagaStatusFilter !== 'all') list = list.filter(v=>v.status===vagaStatusFilter);
  if (vagaSearch) list = list.filter(v=>
    v.titulo.toLowerCase().includes(vagaSearch) ||
    v.empresa.toLowerCase().includes(vagaSearch)
  );
  filteredVagas = list;

  document.getElementById('ct-vagas').textContent = list.length;

  if (!list.length) {
    document.getElementById('table-vagas').innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div>Nenhuma vaga encontrada.</div>`;
    return;
  }

  document.getElementById('table-vagas').innerHTML = `
    <table>
      <thead><tr>
        <th>Cargo</th><th>Empresa</th><th>Candidato</th><th>Pilar</th><th>Status</th><th>Score</th><th>Apply</th><th>CV</th><th></th>
      </tr></thead>
      <tbody>
      ${list.map(v=>{
        const st = SM[v.status]||{dot:'#666',cls:'pill-gray'};
        const cand = DATA.candidatos.find(c=>v.candidatoIds.includes(c.id));
        return `<tr onclick="openEditVaga('${v.id}')">
          <td>
            <div class="td-name">${v.titulo}</div>
            <div class="td-mono">${v.cidade||'—'}</div>
          </td>
          <td class="td-mono">${v.empresa||'—'}</td>
          <td class="td-mono">${cand?cand.nome:'—'}</td>
          <td><span class="pill ${PILAR_COLOR[v.pilar]||'pill-gray'}">${v.pilar||'—'}</span></td>
          <td><span class="pill" style="background:${st.dot}18;color:${st.dot};border-color:${st.dot}33">${v.status||'—'}</span></td>
          <td>
            <div class="score-wrap">
              <span style="font-family:'Geist Mono',monospace;font-size:12px;font-weight:600;color:${scoreColor(v.score)}">${v.score??'—'}</span>
              ${v.score!=null?`<div class="score-bar-bg"><div class="score-bar-fill" style="width:${v.score*10}%;background:${scoreColor(v.score)}"></div></div>`:''}
            </div>
          </td>
          <td>${v.applyConfirmado?'<span class="pill pill-green">✓ Sim</span>':'<span class="pill pill-gray">Não</span>'}</td>
          <td>${v.cvAdaptado?'<span class="pill pill-green">✓ Sim</span>':'<span class="pill pill-gray">Não</span>'}</td>
          <td><button class="btn" onclick="event.stopPropagation();openEditVaga('${v.id}')">✏️</button></td>
        </tr>`;
      }).join('')}
      </tbody>
    </table>`;
}

function setVagaFilter(f) { vagaStatusFilter = f; renderVagas(); }
function filterVagas(q) { vagaSearch = q.toLowerCase(); renderVagas(); }

// ── KANBAN ──
function renderKanban() {
  // cliente filter
  const clientes = [{id:'all',nome:'Todos'}, ...DATA.candidatos];
  document.getElementById('filter-kanban-cliente').innerHTML = clientes.map(c=>
    `<button class="filter-btn ${kanbanClienteFilter===c.id?'active':''}" onclick="setKanbanFilter('${c.id}')">${c.nome}</button>`
  ).join('');

  let vagas = DATA.vagas;
  if (kanbanClienteFilter !== 'all') vagas = vagas.filter(v=>v.candidatoIds.includes(kanbanClienteFilter));

  document.getElementById('kanban-board').innerHTML = STATUSES.map(s=>{
    const svs = vagas.filter(v=>v.status===s.key);
    return `<div class="kcol">
      <div class="kcol-hdr">
        <div class="kcol-title">
          <span class="kcol-dot" style="background:${s.dot}"></span>
          <span style="color:${s.dot}">${s.key}</span>
        </div>
        <span class="kcol-ct">${svs.length}</span>
      </div>
      <div class="kcol-body">
        ${svs.length ? svs.map(v=>{
          const cand = DATA.candidatos.find(c=>v.candidatoIds.includes(c.id));
          return `<div class="kcard" onclick="openEditVaga('${v.id}')">
            <div class="cbar" style="background:${s.dot}"></div>
            <div class="kc-title">${v.titulo}</div>
            <div class="kc-company">${v.empresa}${cand?' · '+cand.nome:''}</div>
            <div class="kc-foot">
              <span class="pill ${PILAR_COLOR[v.pilar]||'pill-gray'}" style="font-size:9px">${v.pilar||'—'}</span>
              ${v.score!=null?`<span class="kc-score" style="font-family:'Geist Mono',monospace;font-size:11px;color:${scoreColor(v.score)}">${v.score}</span>`:''}
            </div>
          </div>`;
        }).join('') : '<div class="kc-empty">Vazio</div>'}
      </div>
    </div>`;
  }).join('');
}

function setKanbanFilter(id) { kanbanClienteFilter = id; renderKanban(); }

// ── CVS ──
function renderCvs() {
  const list = DATA.cvs;
  document.getElementById('ct-cvs').textContent = list.length;
  if (!list.length) {
    document.getElementById('table-cvs').innerHTML = `<div class="empty-state"><div class="empty-icon">📄</div>Nenhum CV gerado ainda.</div>`;
    return;
  }
  const MODULO_CLS = {'M1 - Healthtech':'pill-green','M2 - Regulatório':'pill-purple','M3 - Operations/OpEx':'pill-blue'};

  document.getElementById('table-cvs').innerHTML = `
    <table>
      <thead><tr>
        <th>Arquivo</th><th>Candidato</th><th>Módulo</th><th>Idioma</th><th>Pilar</th><th>Score</th><th>Data</th><th>Palavras-chave</th>
      </tr></thead>
      <tbody>
      ${list.map(cv=>{
        const cand = DATA.candidatos.find(c=>cv.candidatoIds.includes(c.id));

          <td class="td-name">${cv.nome||'—'}</td>

          <td><span class="pill ${PILAR_COLOR[cv.pilar]||'pill-gray'}">${cv.pilar||'—'}</span></td>
          <td style="font-family:'Geist Mono',monospace;font-size:11px;color:${scoreColor(cv.score)}">${cv.score??'—'}</td>
          <td class="td-mono">${cv.dataGeracao?new Date(cv.dataGeracao+'T00:00:00').toLocaleDateString('pt-BR'):'—'}</td>
          <td class="td-mono" style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${cv.palavrasChave||'—'}</td>
        </tr>`;
      }).join('')}
      </tbody>
    </table>`;
}

// MODALS — CANDIDATO
// ══════════════════════════════════════════
function openNewCandidato() {
  document.getElementById('candidato-id').value = '';
  document.getElementById('modal-candidato-title').textContent = 'Novo Candidato';
  ['c-nome','c-email','c-telefone','c-linkedin','c-cidade','c-cidades','c-pilares','c-empresas-prio','c-empresas-evitar','c-diferenciais','c-metricas','c-notas'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('c-senioridade').value = 'Sênior';
  document.getElementById('c-modalidade').value = 'Híbrido';
  document.getElementById('c-status').value = 'Ativo';
  openOverlay('overlay-candidato');
}

function openEditCandidato(id) {
  const c = DATA.candidatos.find(x=>x.id===id);
  if (!c) return;
  document.getElementById('candidato-id').value = id;
  document.getElementById('modal-candidato-title').textContent = 'Editar Candidato';
  document.getElementById('c-nome').value = c.nome||'';
  document.getElementById('c-email').value = c.email||'';
  document.getElementById('c-telefone').value = c.telefone||'';
  document.getElementById('c-linkedin').value = c.linkedin||'';
  document.getElementById('c-cidade').value = c.cidade||'';
  document.getElementById('c-cidades').value = c.cidadesAceitas||'';
  document.getElementById('c-senioridade').value = c.senioridade||'Sênior';
  document.getElementById('c-modalidade').value = c.modalidade||'Híbrido';
  document.getElementById('c-status').value = c.status||'Ativo';
  document.getElementById('c-pilares').value = c.pilares.join(', ')||'';
  document.getElementById('c-empresas-prio').value = c.empresasPrio||'';
  document.getElementById('c-empresas-evitar').value = c.empresasEvitar||'';
  document.getElementById('c-diferenciais').value = c.diferenciais||'';
  document.getElementById('c-metricas').value = c.metricas||'';
  document.getElementById('c-notas').value = c.notas||'';
  openOverlay('overlay-candidato');
}

async function saveCandidato() {
  const id = document.getElementById('candidato-id').value;
  const nome = document.getElementById('c-nome').value.trim();
  if (!nome) { toast('Preencha o nome.', 'error'); return; }

  const pilares = document.getElementById('c-pilares').value.split(',').map(s=>s.trim()).filter(Boolean);

  const props = {
    'Nome': { title: [{ text: { content: nome } }] },
    'Email': { email: document.getElementById('c-email').value.trim()||null },
    'Telefone': { phone_number: document.getElementById('c-telefone').value.trim()||null },
    'LinkedIn': { url: document.getElementById('c-linkedin').value.trim()||null },
    'Cidade': { rich_text: [{ text: { content: document.getElementById('c-cidade').value.trim() } }] },
    'Cidades Aceitas': { rich_text: [{ text: { content: document.getElementById('c-cidades').value.trim() } }] },
    'Senioridade': { select: { name: document.getElementById('c-senioridade').value } },
    'Modalidade': { select: { name: document.getElementById('c-modalidade').value } },
    'Status do Cliente': { select: { name: document.getElementById('c-status').value } },
    'Pilares Ativos': { multi_select: pilares.map(p=>({name:p})) },
    'Empresas Prioritárias': { rich_text: [{ text: { content: document.getElementById('c-empresas-prio').value.trim() } }] },
    'Empresas a Evitar': { rich_text: [{ text: { content: document.getElementById('c-empresas-evitar').value.trim() } }] },
    'Diferenciais Únicos': { rich_text: [{ text: { content: document.getElementById('c-diferenciais').value.trim() } }] },
    'Métricas Master': { rich_text: [{ text: { content: document.getElementById('c-metricas').value.trim() } }] },
    'Notas Internas': { rich_text: [{ text: { content: document.getElementById('c-notas').value.trim() } }] },
  };

  setSyncStatus('syncing', 'Salvando...');
  try {
    if (id) await notionUpdate(id, props);
    else await notionCreate(DB.candidatos, props);
    closeOverlay('overlay-candidato');
    await loadAll();
    toast(id ? 'Candidato atualizado ✓' : 'Candidato criado ✓', 'success');
  } catch(e) {
    setSyncStatus('error', 'Erro ao salvar');
    toast('Erro ao salvar no Notion', 'error');
  }
}

// ══════════════════════════════════════════
// MODALS — VAGA
// ══════════════════════════════════════════
function populateCandidatoSelect(selectedId) {
  document.getElementById('v-candidato').innerHTML = DATA.candidatos.map(c=>
    `<option value="${c.id}" ${c.id===selectedId?'selected':''}>${c.nome}</option>`
  ).join('');
}

function openNewVaga() {
  document.getElementById('vaga-id').value = '';
  document.getElementById('modal-vaga-title').textContent = 'Nova Vaga';
  ['v-titulo','v-empresa','v-cidade','v-link','v-gaps','v-notas'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('v-score').value = '';
  document.getElementById('v-data').value = new Date().toISOString().slice(0,10);
  document.getElementById('v-status').value = 'Salvo';
  document.getElementById('v-pilar').value = 'Product/Program';
  document.getElementById('v-modulo').value = 'M1 - Healthtech';
  document.getElementById('v-apply').value = '__NO__';
  document.getElementById('v-cv').value = '__NO__';

function openEditVaga(id) {
  const v = DATA.vagas.find(x=>x.id===id);
  if (!v) return;
  document.getElementById('vaga-id').value = id;
  document.getElementById('modal-vaga-title').textContent = 'Editar Vaga';
  document.getElementById('v-titulo').value = v.titulo||'';
  document.getElementById('v-empresa').value = v.empresa||'';
  document.getElementById('v-pilar').value = v.pilar||'Product/Program';
  document.getElementById('v-modulo').value = v.modulo||'M1 - Healthtech';
  document.getElementById('v-status').value = v.status||'Salvo';
  document.getElementById('v-score').value = v.score??'';
  document.getElementById('v-cidade').value = v.cidade||'';
  document.getElementById('v-data').value = v.dataAplicacao||'';
  document.getElementById('v-link').value = v.link||'';
  document.getElementById('v-apply').value = v.applyConfirmado ? '__YES__' : '__NO__';
  document.getElementById('v-cv').value = v.cvAdaptado ? '__YES__' : '__NO__';
  document.getElementById('v-gaps').value = v.gaps||'';
  document.getElementById('v-notas').value = v.notas||'';
  populateCandidatoSelect(v.candidatoIds[0]||'');
  openOverlay('overlay-vaga');
}

async function saveVaga() {
  const id = document.getElementById('vaga-id').value;
  const titulo = document.getElementById('v-titulo').value.trim();
  const empresa = document.getElementById('v-empresa').value.trim();
  if (!titulo || !empresa) { toast('Preencha título e empresa.', 'error'); return; }

  const candidatoId = document.getElementById('v-candidato').value;
  const scoreVal = document.getElementById('v-score').value;
  const dataVal = document.getElementById('v-data').value;
  const applyVal = document.getElementById('v-apply').value === '__YES__';
  const cvVal = document.getElementById('v-cv').value === '__YES__';

  const props = {
    'Título': { title: [{ text: { content: titulo } }] },
    'Empresa': { rich_text: [{ text: { content: empresa } }] },
    'Pilar': { select: { name: document.getElementById('v-pilar').value } },
    'Módulo CV': { select: { name: document.getElementById('v-modulo').value } },
    'Status': { select: { name: document.getElementById('v-status').value } },
    'Score': { number: scoreVal ? parseFloat(scoreVal) : null },
    'Cidade': { rich_text: [{ text: { content: document.getElementById('v-cidade').value.trim() } }] },
    'Link da Vaga': { url: document.getElementById('v-link').value.trim()||null },
    'Apply Confirmado': { checkbox: applyVal },
    'CV Adaptado': { checkbox: cvVal },
    'Gaps Identificados': { rich_text: [{ text: { content: document.getElementById('v-gaps').value.trim() } }] },
    'Notas': { rich_text: [{ text: { content: document.getElementById('v-notas').value.trim() } }] },
  };

  if (dataVal) props['Data de Aplicação'] = { date: { start: dataVal } };
  if (candidatoId) props['Candidato'] = { relation: [{ id: candidatoId }] };

  setSyncStatus('syncing', 'Salvando...');
  try {
    if (id) await notionUpdate(id, props);
    else await notionCreate(DB.vagas, props);
    closeOverlay('overlay-vaga');
    await loadAll();
    toast(id ? 'Vaga atualizada ✓' : 'Vaga criada ✓', 'success');
  } catch(e) {
    setSyncStatus('error', 'Erro ao salvar');
    toast('Erro ao salvar no Notion', 'error');
    console.error(e);
  }
}

// ══════════════════════════════════════════
// UI HELPERS
// ══════════════════════════════════════════
function scoreColor(s) {
  if (s == null || s === '—') return 'var(--muted)';
  s = parseFloat(s);
  if (s >= 8) return 'var(--green-light)';
  if (s >= 6) return 'var(--amber-light)';
  return 'var(--red-light)';
}

function switchView(v, btn) {
  currentView = v;
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  if (btn) btn.classList.add('active');
  else document.querySelectorAll('.nav-item').forEach(el=>{
    if (el.getAttribute('onclick')?.includes(`'${v}'`)) el.classList.add('active');
  });

  const titles = {
    dashboard:'Dashboard <em>visão geral</em>',
    candidatos:'Candidatos <em>gestão de perfis</em>',
    vagas:'Vagas <em>pipeline</em>',
    kanban:'Kanban <em>por status</em>',
    cvs:'CVs Gerados <em>histórico</em>',
  };
  document.getElementById('topbar-title').innerHTML = titles[v]||v;
  renderCurrentView();
}

function openOverlay(id) { document.getElementById(id).classList.add('open'); }
function closeOverlay(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.overlay').forEach(el=>
  el.addEventListener('click', e=>{ if(e.target===el) el.classList.remove('open'); })
);

function toast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = (type==='success'?'✓ ':'✕ ') + msg;
  t.className = `toast show ${type}`;
  setTimeout(()=>t.classList.remove('show'), 2800);
}

loadAll();
